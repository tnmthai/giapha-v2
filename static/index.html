<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gia Phả - Vietnamese Family Tree</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- JointJS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jointjs@3.7.7/dist/joint.min.css">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lodash@4.17.21/lodash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/backbone@1.4.1/lib/backbone-min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jointjs@3.7.7/dist/joint.min.js"></script>
    <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>

<!-- ==================== Auth Screen ==================== -->
<div id="auth-screen" class="auth-container">
    <div class="auth-box">
        <h1>🌳 Gia Phả</h1>
        <p class="subtitle">Quản lý gia phả trực tuyến</p>

        <div id="login-form">
            <div class="form-group">
                <label>Tên đăng nhập</label>
                <input type="text" id="login-username" placeholder="Nhập tên đăng nhập" autocomplete="username">
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="login-password" placeholder="Nhập mật khẩu" autocomplete="current-password">
            </div>
            <button class="btn btn-primary" onclick="login()">Đăng nhập</button>
            <div class="auth-toggle">
                Chưa có tài khoản? <a onclick="toggleAuthForm('register')">Đăng ký</a>
            </div>
        </div>

        <div id="register-form" style="display:none">
            <div class="form-group">
                <label>Tên đăng nhập</label>
                <input type="text" id="reg-username" placeholder="Chọn tên đăng nhập" autocomplete="username">
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="reg-password" placeholder="Chọn mật khẩu" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label>Tên hiển thị</label>
                <input type="text" id="reg-displayname" placeholder="Tên của bạn (tùy chọn)">
            </div>
            <button class="btn btn-primary" onclick="register()">Đăng ký</button>
            <div class="auth-toggle">
                Đã có tài khoản? <a onclick="toggleAuthForm('login')">Đăng nhập</a>
            </div>
        </div>
    </div>
</div>

<!-- ==================== App Screen ==================== -->
<div id="app-screen" class="app-container" style="display:none">
    <div class="top-bar">
        <h2 onclick="goBackToList()" style="cursor:pointer">🌳 Gia Phả</h2>
        <div class="user-info">
            <span id="user-display"></span>
            <button class="btn btn-secondary btn-small" onclick="logout()">Đăng xuất</button>
        </div>
    </div>

    <div class="main-content">
        <!-- Family List View -->
        <div id="family-list-view" class="family-list-container">
            <div class="family-list-header">
                <h3>Gia phả của bạn</h3>
                <button class="btn btn-primary" onclick="showCreateFamilyModal()" style="width:auto">+ Tạo mới</button>
            </div>
            <div id="family-list"></div>
        </div>

        <!-- Family Tree View -->
        <div id="family-tree-view" class="tree-container" style="display:none">
            <div class="tree-header">
                <div class="left">
                    <button class="btn btn-secondary btn-small" onclick="goBackToList()">← Quay lại</button>
                    <h3 id="tree-title"></h3>
                </div>
                <div class="tree-actions">
                    <!-- Search -->
                    <div class="search-box">
                        <input type="text" id="search-input" placeholder="🔍 Tìm thành viên..." oninput="debounceSearch()" onkeydown="if(event.key==='Enter')searchMembers()">
                        <div id="search-results" class="search-results"></div>
                    </div>
                    <button class="btn btn-primary btn-small" onclick="showAddMemberModal()" style="width:auto">👤 Thêm</button>
                    <button class="btn btn-success btn-small" onclick="seedFamily(currentFamily.id)">🌱 Mẫu</button>
                    <!-- Export -->
                    <button class="btn btn-secondary btn-small" onclick="exportFamily()" title="Xuất file">📄 Xuất</button>
                    <!-- Share -->
                    <button class="btn btn-secondary btn-small" id="btn-share" onclick="showShareModal()" title="Chia sẻ">🔗 Chia sẻ</button>
                    <!-- Edit family -->
                    <button class="btn btn-secondary btn-small" id="btn-edit-family" onclick="showEditFamilyModal()" title="Sửa tên">✏️</button>
                    <!-- Delete family -->
                    <button class="btn btn-danger btn-small" id="btn-delete-family" onclick="confirmDeleteFamily()" title="Xóa gia phả">🗑️</button>
                    <!-- Connect mode -->
                    <button class="btn btn-secondary btn-small" id="btn-connect-mode" onclick="toggleConnectMode()" title="Chế độ kết nối">🔗 Kết nối</button>
                    <!-- Zoom controls -->
                    <div class="zoom-controls">
                        <button class="btn btn-secondary btn-small" onclick="zoomIn()" title="Phóng to">➕</button>
                        <button class="btn btn-secondary btn-small" onclick="zoomOut()" title="Thu nhỏ">➖</button>
                        <button class="btn btn-secondary btn-small" onclick="zoomFit()" title="Vừa màn hình">⬜</button>
                    </div>
                    <div class="help-tip" title="Click vào thẻ người → chọn Thêm cha/mẹ/vợ/chồng/con để kết nối. Kéo thả để di chuyển. Double-click canvas để thêm mới.">💡</div>
                </div>
            </div>
            <!-- Connect mode status bar -->
            <div id="connect-status" class="connect-status" style="display:none">
                <span>🔗 Chế độ kết nối: Click người thứ nhất...</span>
                <button class="btn btn-secondary btn-small" onclick="toggleConnectMode()">Thoát</button>
            </div>
            <div id="tree-content" style="flex:1;position:relative;overflow:hidden;"></div>
        </div>
    </div>
</div>

<!-- ==================== Create Family Modal ==================== -->
<div id="modal-create-family" class="modal-overlay">
    <div class="modal-box">
        <h3>Tạo gia phả mới</h3>
        <div class="form-group">
            <label>Tên gia phả</label>
            <input type="text" id="family-name-input" placeholder="VD: Gia tộc Trần">
        </div>
        <div class="form-group">
            <label>Mô tả</label>
            <textarea id="family-desc-input" rows="3" placeholder="Mô tả ngắn về gia phả..."></textarea>
        </div>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeModal('modal-create-family')">Hủy</button>
            <button class="btn btn-primary" onclick="createFamily()" style="width:auto">Tạo</button>
        </div>
    </div>
</div>

<!-- ==================== Edit Family Modal ==================== -->
<div id="modal-edit-family" class="modal-overlay">
    <div class="modal-box">
        <h3>Sửa gia phả</h3>
        <div class="form-group">
            <label>Tên gia phả</label>
            <input type="text" id="edit-family-name" placeholder="Tên gia phả">
        </div>
        <div class="form-group">
            <label>Mô tả</label>
            <textarea id="edit-family-desc" rows="3" placeholder="Mô tả..."></textarea>
        </div>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeModal('modal-edit-family')">Hủy</button>
            <button class="btn btn-primary" onclick="updateFamily()" style="width:auto">Lưu</button>
        </div>
    </div>
</div>

<!-- ==================== Add/Edit Member Modal ==================== -->
<div id="modal-add-member" class="modal-overlay">
    <div class="modal-box">
        <h3 id="member-modal-title">Thêm thành viên</h3>
        <div class="form-group">
            <label>Họ và tên *</label>
            <input type="text" id="member-name-input" placeholder="Nguyễn Văn A">
        </div>
        <div class="form-group">
            <label>Giới tính</label>
            <select id="member-gender-input">
                <option value="M">Nam</option>
                <option value="F">Nữ</option>
            </select>
        </div>
        <div class="form-group">
            <label>Năm sinh</label>
            <input type="text" id="member-birth-input" placeholder="1990">
        </div>
        <div class="form-group">
            <label>Năm mất</label>
            <input type="text" id="member-death-input" placeholder="Để trống nếu còn sống">
        </div>
        <div class="form-group">
            <label>Nơi sinh</label>
            <input type="text" id="member-birthplace-input" placeholder="Hà Nội">
        </div>
        <div class="form-group">
            <label>Nghề nghiệp</label>
            <input type="text" id="member-occupation-input" placeholder="Kỹ sư">
        </div>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeModal('modal-add-member')">Hủy</button>
            <button class="btn btn-danger btn-small" id="btn-delete-member" onclick="deleteCurrentMember()" style="display:none;margin-right:auto">🗑️ Xóa</button>
            <button class="btn btn-primary" id="btn-save-member" onclick="saveMember()" style="width:auto">Thêm</button>
        </div>
    </div>
</div>

<!-- ==================== Share Modal ==================== -->
<div id="modal-share" class="modal-overlay">
    <div class="modal-box">
        <h3>🔗 Chia sẻ gia phả</h3>
        <div class="form-group">
            <label>Tên người dùng</label>
            <input type="text" id="share-username" placeholder="Nhập username muốn chia sẻ">
        </div>
        <div class="form-group">
            <label>Quyền</label>
            <select id="share-permission">
                <option value="view">Chỉ xem</option>
                <option value="edit">Chỉnh sửa</option>
            </select>
        </div>
        <button class="btn btn-primary btn-small" onclick="shareFamily()" style="width:auto;margin-bottom:16px">Chia sẻ</button>
        <div id="share-list"></div>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeModal('modal-share')">Đóng</button>
        </div>
    </div>
</div>

<!-- ==================== Member Detail Modal ==================== -->
<div id="modal-member-detail" class="modal-overlay">
    <div class="modal-box modal-box-large">
        <div id="member-detail-content"></div>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeModal('modal-member-detail')">Đóng</button>
            <button class="btn btn-primary" id="btn-edit-member-detail" onclick="editFromDetail()" style="width:auto">✏️ Sửa</button>
        </div>
    </div>
</div>

<!-- ==================== Photo Upload Modal ==================== -->
<div id="modal-photo-upload" class="modal-overlay">
    <div class="modal-box">
        <h3>📷 Upload ảnh</h3>
        <div class="form-group">
            <label>Chọn ảnh (jpg, png, webp - tối đa 5MB)</label>
            <input type="file" id="photo-file-input" accept="image/jpeg,image/png,image/webp">
        </div>
        <div id="photo-preview" class="photo-preview"></div>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeModal('modal-photo-upload')">Hủy</button>
            <button class="btn btn-primary" onclick="uploadPhoto()" style="width:auto">Upload</button>
        </div>
    </div>
</div>

<!-- ==================== Connect Modal ==================== -->
<div id="modal-connect" class="modal-overlay">
    <div class="modal-box">
        <h3>🔗 Chọn quan hệ</h3>
        <p id="connect-desc" style="color:var(--text-secondary);margin-bottom:16px;font-size:14px"></p>
        <div class="connect-options">
            <button class="btn btn-secondary connect-btn" onclick="createConnection('spouse')">💑 Vợ/Chồng</button>
            <button class="btn btn-secondary connect-btn" onclick="createConnection('parent')">👨‍👧 Cha/Mẹ</button>
            <button class="btn btn-secondary connect-btn" onclick="createConnection('child')">👶 Con</button>
            <button class="btn btn-secondary connect-btn" onclick="createConnection('step_parent')">👨‍👦 Cha/Mẹ kế</button>
            <button class="btn btn-secondary connect-btn" onclick="createConnection('stepchild')">👦 Con riêng</button>
            <button class="btn btn-secondary connect-btn" onclick="createConnection('adoptive_parent')">👨‍👧 Cha/Mẹ nuôi</button>
            <button class="btn btn-secondary connect-btn" onclick="createConnection('adopted_child')">👶 Con nuôi</button>
        </div>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeModal('modal-connect')">Hủy</button>
        </div>
    </div>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
